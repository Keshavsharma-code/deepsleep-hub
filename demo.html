<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DeepSleep Hub - Local Demo</title>
  <link rel="stylesheet" href="styles.css">
  <style>
     #demo-controls {
        position: fixed;
        left: 20px;
        top: 20px;
        width: 300px;
        background: rgba(5,5,8,0.9);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        padding: 20px;
        z-index: 1000;
     }
     .btn {
      display: block; width: 100%; padding: 10px; margin-bottom: 10px;
      font-size: 14px; font-weight: bold; color: white; border: none; border-radius: 8px;
      cursor: pointer;
    }
    #openai { background: #333; border: 1px solid #fff; }
    #claude { background: #f97316; }
    #gemini { background: #a855f7; }
    #kimi { background: #ef4444; }
    #dream { background: #fbbf24; color: #000; box-shadow: 0 0 10px #fbbf24; }
  </style>
</head>
<body>
  <!-- ThreeJS Background Effects -->
  <div id="canvas-container"></div>
  
  <!-- Cytoscape Graph -->
  <div id="cy" style="width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 10; background: transparent;"></div>
  
  <!-- Left Side Controls -->
  <div id="demo-controls">
      <h3 style="margin-bottom: 15px; color:#fbbf24;">LOCAL DEMO CONTROLS</h3>
      <button id="openai" class="btn">🧠 ChatGPT: "RAG vs context"</button>
      <button id="claude" class="btn">🟧 Claude: "llm-as-compiler"</button>
      <button id="gemini" class="btn">✨ Gemini: "Obsidian Markdown"</button>
      <button id="kimi" class="btn">🔴 Kimi: "vector-database search"</button>
      <button id="dream" class="btn">💤 DeepSleep-Beta Dream Mode</button>
  </div>

  <div id="memory-vessel" style="position: fixed; bottom: 20px; right: 20px; width: 200px; background: rgba(5,5,8,0.9); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; z-index: 100;">
    <div style="display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 11px; text-transform: uppercase;">
      <span>Neural Pressure</span>
      <span id="memory-percent">0%</span>
    </div>
    <div style="width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden;">
      <div id="memory-fill" style="width: 0%; height: 100%; background: linear-gradient(90deg, #10b981, #f59e0b, #ef4444); transition: width 0.3s;"></div>
    </div>
    <div id="memory-warning" style="margin-top: 8px; font-size: 10px; color: #ef4444; opacity: 0;">
      ⚠️ SYNAPTIC OVERLOAD
    </div>
    <div id="memory-stat" style="font-size: 10px; opacity: 0.6; margin-top: 8px;">Nodes: 0</div>
  </div>

  <div id="thought-stream" style="position: fixed; right: 20px; top: 20px; width: 350px; max-height: 70vh; background: rgba(5,5,8,0.9); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; overflow-y: auto; z-index: 100;">
    <h3 style="margin-bottom: 20px; font-weight: normal; letter-spacing: 1px;">KNOWLEDGE STREAM</h3>
    <div id="thoughts-list"></div>
  </div>

  <!-- Dependencies -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.0/gsap.min.js"></script>

  <!-- Mocking the Chrome API for local use so brain.js loads -->
  <script>
     window.chrome = {
        runtime: {
           onMessage: { addListener: (cb) => { window._handleExtMsg = cb; } }
        }
     };
  </script>

  <script type="module">
     import { GraphDB, AI_COLORS } from './db.js';
     import { KnowledgeExtractor } from './extractor.js';
     import './brain.js'; // Imports and executes the visualization

     async function processThoughtAsync(ai, content) {
        const { concepts, relationships } = KnowledgeExtractor.extractPatterns(content);
        
        if (concepts.length > 0) {
            const dbConceptIds = {};
            for (const c of concepts) {
              if (!dbConceptIds[c.name]) {
                const vector = Array.from({length: 384}, () => Math.random() - 0.5); 
                dbConceptIds[c.name] = await GraphDB.addConcept(c.name, ai, vector);
                c.dbId = dbConceptIds[c.name];
              } else { c.dbId = dbConceptIds[c.name]; }
            }
          
            for (const r of relationships) {
               const sourceConcept = concepts.find(c => c.id === r.source);
               const targetConcept = concepts.find(c => c.id === r.target);
               if (sourceConcept && targetConcept && sourceConcept.dbId && targetConcept.dbId) {
                   r.dbId = await GraphDB.addRelationship(sourceConcept.dbId, targetConcept.dbId, r.type, content);
                   r.sourceDbId = sourceConcept.dbId;
                   r.targetDbId = targetConcept.dbId;
               }
            }
            await GraphDB.calculateImportance();
        }

        // Fire heavily mocked event format expected by brain.js
        if (window._handleExtMsg) {
             window._handleExtMsg({
                type: 'NEW_THOUGHT',
                ai: ai,
                text: content,
                concepts: concepts,
                relationships: relationships
             });
        }
     }

     document.getElementById('openai').onclick = () => processThoughtAsync('openai', 'The RAG-vs-long-context debate is interesting. retrieval architecture implements vector search.');
     document.getElementById('claude').onclick = () => processThoughtAsync('claude', 'Using an llm-as-compiler requires a strict syntax parser. This implements rigid logic.');
     document.getElementById('gemini').onclick = () => processThoughtAsync('gemini', 'Obsidian workflows heavily rely on Markdown documents. It builds on local files.');
     document.getElementById('kimi').onclick = () => processThoughtAsync('kimi', 'A semantic retrieval-strategy needs dense embeddings. It implements semantic search.');
     document.getElementById('dream').onclick = () => processThoughtAsync('deepsleep_beta', 'Neural consolidation process active. DeepSleep consolidation optimization.');
  </script>
</body>
</html>
