<!DOCTYPE html>
<html>
<head>
  <title>DeepSleep Sandbox</title>
  <style>
    body { font-family: 'SF Mono', sans-serif; background: #050508; color: white; padding: 40px; }
    h1 { margin-bottom: 5px; color: #fbbf24; }
    p { color: #888; margin-bottom: 30px; }
    .btn {
      display: block; width: 350px; padding: 15px; margin-bottom: 15px;
      font-size: 16px; font-weight: bold; color: white; border: none; border-radius: 8px;
      cursor: pointer; transition: transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    #openai { background: #333; border: 1px solid #fff; }
    #claude { background: #f97316; }
    #gemini { background: #a855f7; }
    #kimi { background: #ef4444; }
    #dream { background: #fbbf24; color: #000; box-shadow: 0 0 15px #fbbf24; }
    
    .console { margin-top: 30px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 5px; color: #10b981; min-height: 100px; border: 1px solid #333; }
  </style>
</head>
<body>

  <h1>Sandbox Controller</h1>
  <p>Trigger fake responses to inject thoughts directly into the background worker.</p>
  
  <p><i>Make sure you have <b>brain.html</b> open in another tab to watch the graph grow!</i></p>

  <button id="openai" class="btn">🧠 Simulate ChatGPT: "RAG vs long context window"</button>
  <button id="claude" class="btn">🟧 Simulate Claude: "llm-as-compiler implements parsing"</button>
  <button id="gemini" class="btn">✨ Simulate Gemini: "Obsidian workflows builds on Markdown"</button>
  <button id="kimi" class="btn">🔴 Simulate Kimi: "vector-database implements retrieval strategy"</button>
  
  <br/>
  
  <button id="dream" class="btn">💤 Trigger DeepSleep-Beta Dream Mode</button>
  
  <div class="console" id="log">Waiting for action...</div>

  <script>
    const logEl = document.getElementById('log');
    function log(msg) { logEl.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`; }
    
    function sendFakeThought(ai, content) {
      if (!chrome.runtime || !chrome.runtime.sendMessage) {
         log("Error: You must open this page via the extension URL (chrome-extension://...)");
         return;
      }
      chrome.runtime.sendMessage({
        type: 'CAPTURE_THOUGHT',
        ai: ai,
        content: content,
        fullLog: ""
      }, (response) => {
        log(`Sent ${ai} thought. Success: ${response?.success}`);
      });
    }

    document.getElementById('openai').onclick = () => sendFakeThought('openai', 'The RAG-vs-long-context debate is interesting. retrieval architecture implements vector search.');
    document.getElementById('claude').onclick = () => sendFakeThought('claude', 'Using an llm-as-compiler requires a strict syntax parser. This implements rigid logic.');
    document.getElementById('gemini').onclick = () => sendFakeThought('gemini', 'Obsidian workflows heavily rely on Markdown documents. It builds on local files.');
    document.getElementById('kimi').onclick = () => sendFakeThought('kimi', 'A semantic retrieval-strategy needs dense embeddings. It implements semantic search.');
    document.getElementById('dream').onclick = () => sendFakeThought('deepsleep_beta', 'Neural consolidation process active. DeepSleep consolidation optimization.');
  </script>

</body>
</html>
