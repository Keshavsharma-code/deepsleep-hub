<!DOCTYPE html>
<html>
<head>
  <style>
    body { 
      width: 350px; 
      background: #050508; color: white; margin: 0; padding: 15px;
      font-family: 'SF Mono', 'Courier New', monospace;
    }
    h2 { font-size: 14px; letter-spacing: 2px; text-transform: uppercase; margin-top: 0; }
    .memory-list { margin-top: 15px; max-height: 300px; overflow-y: auto; }
    .memory-item {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px; padding: 10px; margin-bottom: 10px; font-size: 11px;
      transition: all 0.2s; cursor: pointer;
    }
    .memory-item:hover { background: rgba(255,255,255,0.1); }
    .source-tag { font-weight: 800; font-size: 9px; margin-bottom: 4px; }
    button {
      width: 100%; padding: 12px; background: #10b981; border: none;
      color: white; border-radius: 6px; font-weight: 800; cursor: pointer;
      font-family: inherit; margin-top: 10px;
    }
    button.secondary { background: rgba(59, 130, 246, 0.2); border: 1px solid #3b82f6; }
  </style>
</head>
<body>
  <h2>DeepSleep v3.0</h2>
  <div id="status" style="font-size: 9px; color: #64748b;">NEURAL FLOW: ACTIVE</div>
  
  <div class="memory-list" id="memory-list">
    <div style="font-size: 11px; color:#475569;">Awaiting neural capture...</div>
  </div>

  <button id="open-brain">OPEN VISUAL CORTEX 3D</button>
  <button id="clear-memories" class="secondary">PURGE MEMORY</button>

  <script src="popup.js"></script>
</body>
</html>
