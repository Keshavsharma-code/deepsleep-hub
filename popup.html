<!DOCTYPE html>
<html>
<head>
  <title>DeepSleep Hub</title>
  <style>
    body {
      width: 320px;
      padding: 0;
      margin: 0;
      background: #0f172a;
      color: #f1f5f9;
      font-family: 'SF Mono', 'Roboto Mono', monospace;
    }
    .header {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      padding: 16px;
      border-bottom: 1px solid #334155;
      text-align: center;
    }
    .logo { font-size: 24px; margin-bottom: 4px; }
    .status { font-size: 10px; color: #10b981; letter-spacing: 1px; }
    
    .menu { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    
    .btn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 6px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: all 0.2s;
      display: block;
    }
    .btn:hover { background: #2563eb; transform: translateY(-1px); }
    
    .btn-outline {
      background: transparent;
      border: 1px solid #334155;
      color: #94a3b8;
    }
    .btn-outline:hover { background: #1e293b; color: white; }

    .memory-count {
      font-size: 11px;
      color: #64748b;
      text-align: center;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🧠</div>
    <div class="status">NEURAL CORE ACTIVE</div>
  </div>
  
  <div class="menu">
    <a href="brain.html" target="_blank" class="btn">ENTER 3D VISUAL CORTEX</a>
    <button id="reset-widget" class="btn btn-outline">RESTORE BRAIN ICON</button>
  </div>

  <div class="memory-count" id="count">Connecting to neurons...</div>

  <script src="popup.js"></script>
</body>
</html>
