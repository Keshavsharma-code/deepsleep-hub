<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DeepSleep Hub - Neural Interface</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #050508; 
      color: white; 
      font-family: 'SF Mono', monospace;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    #canvas-container { 
      width: 100vw; 
      height: 100vh; 
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }
    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      pointer-events: none;
    }
    #thought-stream {
      position: absolute;
      right: 20px;
      top: 20px;
      width: 350px;
      max-height: 60vh;
      background: rgba(5, 5, 8, 0.9);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
      overflow-y: auto;
      pointer-events: auto;
      backdrop-filter: blur(10px);
    }
    .thought {
      margin-bottom: 12px;
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      border-left: 3px solid;
      animation: slideIn 0.3s ease-out;
      font-size: 12px;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    #neural-pressure {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 250px;
      background: rgba(5, 5, 8, 0.9);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 15px;
      pointer-events: auto;
    }
    .pressure-bar {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 8px;
    }
    .pressure-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #10b981, #f59e0b, #ef4444);
      transition: width 0.3s;
    }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fbbf24;
      font-size: 14px;
      z-index: 100;
      text-align: center;
    }
    .ai-orb {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
  </style>
</head>
<body>
  <div id="loading">Initializing Neural Mesh...</div>
  <div id="canvas-container"></div>
  
  <div id="ui-layer">
    <div id="thought-stream">
      <h3 style="margin-bottom: 15px; font-weight: normal; letter-spacing: 1px; font-size: 14px;">KNOWLEDGE STREAM</h3>
      <div id="thoughts-list"></div>
    </div>
    
    <div id="neural-pressure">
      <div style="display: flex; justify-content: space-between; font-size: 11px; text-transform: uppercase; letter-spacing: 1px;">
        <span>Neural Pressure</span>
        <span id="pressure-text">0%</span>
      </div>
      <div class="pressure-bar">
        <div class="pressure-fill" id="pressure-bar"></div>
      </div>
      <div style="margin-top: 8px; font-size: 10px; opacity: 0.5;">
        Nodes: <span id="node-count">0</span> / 50
      </div>
    </div>
  </div>

  <!-- Three.js from jsDelivr (reliable CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
  
  <script src="brain.js"></script>
</body>
</html>
