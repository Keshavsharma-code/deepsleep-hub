<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DeepSleep Hub - Semantic Neural Graph</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- ThreeJS Background Effects -->
  <div id="canvas-container"></div>
  
  <!-- Cytoscape Graph -->
  <div id="cy" style="width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 10; background: transparent;"></div>
  
  <div id="memory-vessel" style="position: fixed; bottom: 20px; right: 20px; width: 200px; background: rgba(5,5,8,0.9); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; z-index: 100;">
    <div style="display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 11px; text-transform: uppercase;">
      <span>Neural Pressure</span>
      <span id="memory-percent">0%</span>
    </div>
    <div style="width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden;">
      <div id="memory-fill" style="width: 0%; height: 100%; background: linear-gradient(90deg, #10b981, #f59e0b, #ef4444); transition: width 0.3s;"></div>
    </div>
    <div id="memory-warning" style="margin-top: 8px; font-size: 10px; color: #ef4444; opacity: 0; transition: opacity 0.3s;">
      ⚠️ SYNAPTIC OVERLOAD
    </div>
    <div id="memory-stat" style="font-size: 10px; opacity: 0.6; margin-top: 8px;">Nodes: 0</div>
  </div>

  <div id="thought-stream" style="position: fixed; right: 20px; top: 20px; width: 350px; max-height: 70vh; background: rgba(5,5,8,0.9); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; overflow-y: auto; z-index: 100;">
    <h3 style="margin-bottom: 20px; font-weight: normal; letter-spacing: 1px;">KNOWLEDGE STREAM</h3>
    <div id="thoughts-list"></div>
  </div>

  <!-- Dependencies -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.0/gsap.min.js"></script>

  <!-- Module to manage both -->
  <script type="module" src="brain.js"></script>
</body>
</html>
